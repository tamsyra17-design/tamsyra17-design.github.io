<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>iframe উদাহরণ</title>
    <style>
        /* চাইলে স্টাইল দিয়ে আকার ঠিক করতে পারেন */
        .embed-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2>এম্বেড করা পেজ</h2>
    <div class="embed-container">
        <!-- src-এ আপনার পছন্দের URL বসান -->
        <iframe 
            src="https://script.google.com/macros/s/AKfycbw7-xTbFIWVCFX66EYwaVLaZw2TA_cosAMBK7xh2JtokQ8A0ljpwAqMtVtSGctRFk_I/exec?admin=1" 
            title="এম্বেড করা কন্টেন্ট"
            allowfullscreen
            loading="lazy">
        </iframe>
    </div>
</body>
</html>
