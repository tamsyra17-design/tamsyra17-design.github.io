<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ফুল স্ক্রিন iframe</title>
    <style>
        /* ব্রাউজারের পুরো জায়গা নিতে */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* নিজস্ব স্ক্রল বন্ধ */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- src-এ আপনার কাঙ্ক্ষিত URL বসান -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbw7-xTbFIWVCFX66EYwaVLaZw2TA_cosAMBK7xh2JtokQ8A0ljpwAqMtVtSGctRFk_I/exec?admin=1" 
        title="পূর্ণ পর্দা কন্টেন্ট"
        allowfullscreen>
    </iframe>
</body>
</html>
